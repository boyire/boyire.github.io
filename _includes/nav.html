<!-- Navigation -->
<nav class="navbar navbar-default navbar-custom navbar-fixed-top portfolio-nav" aria-label="Main navigation">
    <div class="container-fluid">
        <div class="navbar-header page-scroll">
            <button type="button" class="navbar-toggle" aria-expanded="false" aria-controls="huxblog_navbar">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
        </div>

        <div id="huxblog_navbar" aria-hidden="true">
            <div class="navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="{{ site.baseurl }}/#projects">项目</a></li>
                    <li><a href="{{ site.baseurl }}/#writing">笔记</a></li>
                    <li><a href="{{ site.baseurl }}/#friends">友链</a></li>
                    <li><a href="{{ site.baseurl }}/about/">关于</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>
<script>
    (function () {
        var toggle = document.querySelector('.navbar-toggle');
        var navbar = document.querySelector('#huxblog_navbar');
        var collapse = document.querySelector('.navbar-collapse');
        if (!toggle || !navbar || !collapse) return;
        var mobileQuery = window.matchMedia && window.matchMedia('(max-width: 767px)');

        function syncAccessibility(open) {
            var isMobile = mobileQuery ? mobileQuery.matches : window.innerWidth <= 767;
            navbar.setAttribute('aria-hidden', isMobile && !open ? 'true' : 'false');
        }

        function closeNav() {
            navbar.className = '';
            toggle.setAttribute('aria-expanded', 'false');
            syncAccessibility(false);
            setTimeout(function () {
                if (navbar.className.indexOf('in') < 0) collapse.style.height = '0px';
            }, 260);
        }

        function openNav() {
            collapse.style.height = 'auto';
            navbar.className = 'in';
            toggle.setAttribute('aria-expanded', 'true');
            syncAccessibility(true);
        }

        toggle.addEventListener('click', function () {
            if (navbar.className.indexOf('in') >= 0) closeNav();
            else openNav();
        });

        document.addEventListener('click', function (event) {
            if (toggle.contains(event.target) || navbar.contains(event.target)) return;
            closeNav();
        });

        document.addEventListener('keydown', function (event) {
            if (event.key === "Escape" && navbar.className.indexOf('in') >= 0) {
                closeNav();
                toggle.focus();
            }
        });

        function syncViewportState() {
            if (!mobileQuery.matches) {
                navbar.className = '';
                collapse.style.height = 'auto';
            }
            syncAccessibility(false);
        }

        if (mobileQuery) {
            if (mobileQuery.addEventListener) {
                mobileQuery.addEventListener('change', syncViewportState);
            } else {
                mobileQuery.addListener(syncViewportState);
            }
        }
        syncAccessibility(false);
    })();
</script>
