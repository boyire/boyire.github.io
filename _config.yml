# Site settings
title: "项目实验室"
SEOTitle: "项目实验室 | 项目与笔记"
header-img: img/home-bg.jpg
email: ""
description: "用于整理项目、笔记、实验与构建记录的个人空间。"
keyword: "项目, 笔记, 实验, 前端, AI, GitHub Pages"
url: ""
baseurl: ""
github_repo: ""
repository_url: "https://github.com/boyire/boyire.github.io"
profile_edit_url: "https://github.com/boyire/boyire.github.io/edit/master/_config.yml"
about_edit_url: "https://github.com/boyire/boyire.github.io/edit/master/about.html"
projects_edit_url: "https://github.com/boyire/boyire.github.io/edit/master/_data/projects.yml"
posts_edit_url: "https://github.com/boyire/boyire.github.io/tree/master/_posts"
new_post_url: "https://github.com/boyire/boyire.github.io/new/master/_posts?filename=YYYY-MM-DD-new-note.md"
content_guide_url: "https://github.com/boyire/boyire.github.io/blob/master/CONTENT_GUIDE.md"

# Profile
tagline: "把想法做成可以运行的原型。"
hero_role: "项目 / 笔记 / 实验"
location: ""
github_username: ""
sidebar: true
sidebar-about-description: "项目、笔记、实验与复盘。"
sidebar-avatar: ""

# SNS settings
RSS: false

# Build settings
permalink: pretty
paginate: 10
exclude: ["less", "node_modules", "Gruntfile.js", "package.json", "README.md", "Gemfile", "Gemfile.lock", "build-jekyll.cmd", "start-jekyll.cmd", "start-jekyll-log.cmd", "jekyll-serve.log"]
anchorjs: true

# Gems
plugins: [jekyll-paginate]

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

# Featured Tags
featured-tags: true
featured-condition-size: 1

# Progressive Web Apps
chrome-tab-theme-color: "#111827"
service-worker: true
service_worker_version: "20260612-1"
asset_version: "20260612-1"

friends: []
